<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Callback - Chicken Hub</title>
    <style>
        body {
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
        }
        
        .loading {
            text-align: center;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #1DB954;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        
        p {
            color: #cccccc;
        }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <h1>🎵 Authorizing...</h1>
        <p>Redirecting you back to Chicken Hub</p>
    </div>

    <script>
        // 獲取URL中的access token
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get('access_token');
        const error = params.get('error');

        if (error) {
            document.body.innerHTML = `
                <div style="text-align: center; color: #ff6b6b;">
                    <h1>❌ Authorization Failed</h1>
                    <p>Error: ${error}</p>
                    <button onclick="window.location.href='/';" style="
                        background: #1DB954;
                        color: #000;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 20px;
                        cursor: pointer;
                        margin-top: 20px;
                    ">
                        Back to Home
                    </button>
                </div>
            `;
        } else if (accessToken) {
            // 將token存儲到localStorage
            localStorage.setItem('spotify_access_token', accessToken);
            localStorage.setItem('spotify_token_time', Date.now().toString());
            
            // 重定向回主頁
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        } else {
            document.body.innerHTML = `
                <div style="text-align: center; color: #ff6b6b;">
                    <h1>⚠️ No Token Received</h1>
                    <p>Unable to get access token.</p>
                    <button onclick="window.location.href='/';" style="
                        background: #1DB954;
                        color: #000;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 20px;
                        cursor: pointer;
                        margin-top: 20px;
                    ">
                        Back to Home
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
